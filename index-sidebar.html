<style>
:root{--sb-bg:#0f172a;--sb-surface:rgba(15,23,42,0.6);--sb-border:rgba(255,107,107,0.15);--sb-text:#e2e8f0;--sb-muted:rgba(148,163,184,0.6);--sb-accent:#ff6b6b;--sb-accent2:#48cae4;--sb-glow:rgba(255,107,107,0.2);--glass-bg:var(--sb-surface);--glass-border:var(--sb-border);--text-main:var(--sb-text);--text-muted:var(--sb-muted);--theme-accent:var(--sb-accent);--theme-accent2:var(--sb-accent2);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans SC',sans-serif;-webkit-tap-highlight-color:transparent;}
body{min-height:100vh;display:block;background:var(--sb-bg);color:var(--sb-text);overflow-x:hidden;padding:0;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 40% 30%,rgba(255,107,107,0.04) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(72,202,228,0.03) 0%,transparent 50%);}
#skeleton-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100000;background:var(--sb-bg);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.7s;}
#skeleton-overlay.fade-out{opacity:0;pointer-events:none;}
.skeleton-spinner{width:45px;height:45px;border:2px solid rgba(255,107,107,0.15);border-top-color:var(--sb-accent);border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.skeleton-text{color:var(--sb-accent);margin-top:16px;font-size:0.85rem;letter-spacing:3px;}

/* 侧边栏 */
.sb-sidebar{position:fixed;top:0;left:0;width:80px;height:100vh;z-index:50;background:rgba(15,23,42,0.95);backdrop-filter:blur(20px);border-right:1px solid var(--sb-border);display:flex;flex-direction:column;align-items:center;padding:16px 0;animation:sbSlide 0.5s ease forwards;}
@keyframes sbSlide{from{transform:translateX(-80px);}to{transform:translateX(0);}}
.sb-avatar-sm{width:36px;height:36px;border-radius:50%;background:url('https://q1.qlogo.cn/g?b=qq&nk=YOUR_QQ_HERE&s=640') center/cover;border:2px solid rgba(255,107,107,0.3);margin-bottom:20px;flex-shrink:0;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.sb-nav-btn{width:46px;height:46px;border-radius:14px;border:1px solid transparent;background:rgba(255,107,107,0.04);color:var(--sb-muted);font-size:1.15rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;position:relative;}
.sb-nav-btn:hover,.sb-nav-btn.active{background:rgba(255,107,107,0.1);border-color:rgba(255,107,107,0.2);color:var(--sb-accent);}
.sb-nav-btn:hover::after{content:attr(data-tip);position:absolute;left:54px;background:rgba(15,23,42,0.95);color:var(--sb-text);padding:4px 10px;border-radius:6px;font-size:0.72rem;white-space:nowrap;z-index:100;border:1px solid var(--sb-border);}
.sb-sidebar-foot{font-size:0.6rem;color:var(--sb-muted);writing-mode:vertical-rl;letter-spacing:3px;padding:16px 0 8px;}

/* 主内容区 */
.sb-main{margin-left:80px;position:relative;z-index:10;min-height:100vh;padding:20px;max-width:calc(1100px + 80px);animation:sbFade 0.6s ease forwards;}
@keyframes sbFade{from{opacity:0;}to{opacity:1;}}

/* 顶栏 */
.sb-topbar{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:16px 24px;margin-bottom:20px;background:var(--sb-surface);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:1px solid var(--sb-border);border-radius:18px;}
.sb-clock-area{display:flex;align-items:baseline;gap:14px;}
#clock-time{font-size:2.2rem;font-weight:700;letter-spacing:2px;color:var(--sb-accent);line-height:1;}
#clock-date{font-size:0.82rem;color:var(--sb-muted);}
#weather-widget{display:flex;align-items:center;gap:12px;}
.weather-icon{color:var(--sb-accent);font-size:1.5rem;}
.weather-temp{font-size:1.2rem;font-weight:600;color:var(--sb-text);}
.weather-desc,.weather-city{font-size:0.72rem;color:var(--sb-muted);}
.weather-loading{color:var(--sb-muted);font-size:0.85rem;}

/* 中间区域两列 */
.sb-middle{display:grid;grid-template-columns:1fr 1.5fr;gap:20px;margin-bottom:20px;}

/* 个人卡 */
.sb-card{background:var(--sb-surface);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:1px solid var(--sb-border);border-radius:18px;padding:24px;transition:all 0.4s;}
.sb-card:hover{border-color:rgba(255,107,107,0.25);}
.sb-profile{text-align:center;}
.sb-avatar{width:80px;height:80px;border-radius:50%;margin:0 auto 14px;background:url('https://q1.qlogo.cn/g?b=qq&nk=YOUR_QQ_HERE&s=640') center/cover;border:2px solid rgba(255,107,107,0.3);box-shadow:0 6px 20px var(--sb-glow);}
.sb-name{font-size:1.3rem;font-weight:700;color:var(--sb-accent);margin-bottom:8px;}
#typed-text{font-size:0.85rem;color:var(--sb-muted);line-height:1.7;min-height:40px;margin-bottom:14px;}
.sb-links{display:flex;flex-direction:column;gap:7px;}
.sb-link{display:flex;align-items:center;gap:10px;padding:9px 14px;background:rgba(255,107,107,0.04);border:1px solid rgba(255,107,107,0.1);border-radius:12px;color:var(--sb-text);text-decoration:none;font-size:0.82rem;transition:all 0.3s;cursor:pointer;}
.sb-link:hover{background:rgba(255,107,107,0.1);border-color:var(--sb-accent);transform:translateX(4px);}
.sb-link i{width:18px;text-align:center;color:var(--sb-accent);}
.sb-stats{display:flex;justify-content:center;gap:20px;margin-top:14px;font-size:0.75rem;color:var(--sb-muted);}
.sb-stats .num{color:var(--sb-accent);font-weight:600;}

/* 工具网格 */
.sb-tools-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.sb-tool{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:rgba(255,107,107,0.03);border:1px solid rgba(255,107,107,0.07);border-radius:14px;text-decoration:none;color:var(--sb-text);transition:all 0.3s;cursor:pointer;}
.sb-tool:hover{background:rgba(255,107,107,0.08);border-color:var(--sb-accent);transform:translateY(-2px);}
.sb-tool i{font-size:1.3rem;color:var(--sb-accent);}
.sb-tool span{font-size:0.65rem;color:var(--sb-muted);}

/* 播放器 */
.sb-player{padding:20px;background:var(--sb-surface);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:1px solid var(--sb-border);border-radius:18px;margin-bottom:20px;}
.sb-player-top{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
#vinyl-record{width:62px;height:62px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid rgba(255,107,107,0.2);}
#vinyl-record.playing{animation:vinylSpin 3.5s linear infinite;}
@keyframes vinylSpin{to{transform:rotate(360deg);}}
#vinyl-record img{width:100%;height:100%;object-fit:cover;}
.sb-player-info{flex:1;min-width:0;}
#player-title{font-size:0.95rem;color:var(--sb-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#player-artist{font-size:0.75rem;color:var(--sb-muted);margin-top:2px;}
#player-source-tag{font-size:0.58rem;color:var(--sb-muted);border:1px solid var(--sb-border);padding:2px 6px;border-radius:6px;}
#progress-container{width:100%;height:4px;background:rgba(255,107,107,0.1);border-radius:2px;margin:10px 0;cursor:pointer;}
#progress-fill{height:100%;background:linear-gradient(90deg,var(--sb-accent),var(--sb-accent2));border-radius:2px;width:0%;}
.sb-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sb-btn{background:rgba(255,107,107,0.06);border:1px solid rgba(255,107,107,0.12);color:var(--sb-text);padding:7px 12px;border-radius:10px;cursor:pointer;font-size:0.78rem;transition:all 0.3s;}
.sb-btn:hover{background:rgba(255,107,107,0.14);border-color:var(--sb-accent);}
.sb-btn.play-pause{background:linear-gradient(135deg,var(--sb-accent),var(--sb-accent2));color:#fff;border:none;padding:9px 16px;}
.sb-search{display:flex;gap:6px;margin-top:8px;}
.sb-search input{flex:1;background:rgba(255,107,107,0.03);border:1px solid rgba(255,107,107,0.1);color:var(--sb-text);padding:8px 12px;border-radius:10px;font-size:0.82rem;outline:none;}
.sb-search input:focus{border-color:var(--sb-accent);}
.sb-search input::placeholder{color:var(--sb-muted);}
/* 面板 - 平滑展开 */
#lyric-panel,#history-panel,#bg-settings-panel{max-height:0;opacity:0;overflow:hidden;margin-top:0;padding:0 24px;background:rgba(15,23,42,0.4);border:1px solid var(--sb-border);border-radius:12px;font-size:0.82rem;transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1),opacity 0.4s cubic-bezier(0.4,0,0.2,1),padding 0.4s cubic-bezier(0.4,0,0.2,1),margin-top 0.4s cubic-bezier(0.4,0,0.2,1);}
#lyric-panel.show,#history-panel.show,#bg-settings-panel.show{max-height:300px;opacity:1;margin-top:10px;padding:14px 24px;}
.lyric-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:0.8rem;color:var(--sb-muted);}
#lyric-content{position:relative;overflow-y:auto;max-height:220px;padding:4px 0;}
..lyric-empty{text-align:center;color:var(--sb-muted);padding:20px;font-size:0.85rem;}
#bg-options{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.bg-option{width:60px;height:50px;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;opacity:0.6;transition:all 0.3s;}
.bg-option.active,.bg-option:hover{border-color:var(--sb-accent);opacity:1;}
.bg-option img{width:100%;height:100%;object-fit:cover;}
.bg-option-label{font-size:0.65rem;text-align:center;color:var(--sb-muted);margin-top:2px;}
.bg-url-input{width:100%;padding:7px 10px;border-radius:8px;border:1px solid var(--sb-border);background:rgba(15,23,42,0.4);color:var(--sb-text);font-size:0.78rem;outline:none;margin-top:6px;}
.bg-reset-btn,.bg-upload-btn{display:inline-block;padding:6px 12px;border-radius:6px;border:1px solid var(--sb-border);background:rgba(255,107,107,0.04);color:var(--sb-muted);cursor:pointer;font-size:0.75rem;margin-top:4px;}
.video-scale-selector{display:flex;gap:6px;margin-top:6px;}
.video-scale-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--sb-border);background:rgba(255,107,107,0.03);color:var(--sb-muted);cursor:pointer;font-size:0.72rem;}
.video-scale-btn.active{border-color:var(--sb-accent);color:var(--sb-accent);}
.lyric-line{padding:6px 10px;cursor:pointer;font-size:0.82rem;color:var(--sb-muted);transition:all 0.3s;border-radius:8px;line-height:1.5;}
.lyric-line:hover{background:rgba(255,107,107,0.06);}
.lyric-line.active{color:var(--sb-accent);font-weight:600;font-size:0.95rem;text-shadow:0 0 10px rgba(255,107,107,0.4);}
.lyric-line.past{opacity:0.35;}
.music-list
.music-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid rgba(255,107,107,0.04);cursor:pointer;transition:all 0.2s;border-radius:8px;}
.music-item:hover,.music-item.active{background:rgba(255,107,107,0.05);}
.music-item .music-name{font-size:0.82rem;}
.music-item .music-artist{font-size:0.7rem;color:var(--sb-muted);}
.status-msg{text-align:center;color:var(--sb-muted);padding:10px;font-size:0.85rem;}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:10000;background:rgba(15,23,42,0.9);backdrop-filter:blur(16px);border:1px solid var(--sb-border);border-radius:12px;padding:10px 20px;display:none;font-size:0.85rem;color:var(--sb-text);}
#bio-modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;display:none;}
#bio-modal-backdrop{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:500;display:none;}
#bio-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:420px;max-height:80vh;background:rgba(15,23,42,0.95);backdrop-filter:blur(20px);border:1px solid var(--sb-border);border-radius:16px;padding:24px;z-index:501;display:none;overflow-y:auto;}
.bio-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:0.9rem;}
.bio-body .bio-loading{text-align:center;color:var(--sb-muted);padding:30px;}
.footer{text-align:center;padding:30px 0 20px;font-size:0.78rem;color:rgba(148,163,184,0.4);}
.footer a{color:var(--sb-accent);text-decoration:none;}
@media(max-width:768px){.sb-middle{grid-template-columns:1fr;}.sb-tools-grid{grid-template-columns:repeat(3,1fr);}#clock-time{font-size:1.6rem;}.sb-sidebar{width:60px;}.sb-nav-btn{width:38px;height:38px;font-size:0.95rem;}.sb-main{margin-left:60px;padding:14px;}}
</style>
</head>
